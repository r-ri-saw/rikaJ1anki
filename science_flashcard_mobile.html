
<style>
* { box-sizing: border-box; }
body { margin: 0; }
.screen { display: none; padding: 0 0 1rem; }
.screen.active { display: block; }

.top-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0.75rem 0; margin-bottom: 0.75rem;
  border-bottom: 0.5px solid var(--border);
}
.top-bar h2 { margin: 0; font-size: 16px; font-weight: 500; }

.btn {
  cursor: pointer; border: 0.5px solid var(--border-strong);
  border-radius: var(--radius); padding: 0.5rem 0.875rem;
  background: transparent; color: var(--text-primary);
  font-size: 14px; font-family: var(--font-sans);
  min-height: 44px; display: inline-flex; align-items: center; gap: 6px;
}
.btn:active { transform: scale(0.97); }
.btn-icon { padding: 0.5rem; min-width: 44px; justify-content: center; }

.btn-full {
  width: 100%; border-radius: 10px; padding: 0.875rem 1rem;
  font-size: 15px; font-weight: 500; min-height: 52px;
  cursor: pointer; font-family: var(--font-sans);
  border: 0.5px solid var(--border-strong);
  background: transparent; color: var(--text-primary);
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-full:active { transform: scale(0.98); }
.btn-full.accent {
  background: var(--bg-accent); border-color: var(--border-accent);
  color: var(--text-accent);
}

.card {
  background: var(--surface-2); border: 0.5px solid var(--border);
  border-radius: 12px; padding: 1rem;
}
.tag {
  font-size: 11px; padding: 3px 8px; border-radius: 20px;
  border: 0.5px solid; display: inline-block; font-weight: 500;
}
.stat-grid {
  display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 8px;
}
.stat-card {
  background: var(--surface-1); border-radius: var(--radius);
  padding: 0.75rem; text-align: center;
}
.stat-num { font-size: 24px; font-weight: 500; line-height: 1.2; }
.stat-label { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

.progress-bar { height: 5px; border-radius: 3px; background: var(--surface-1); overflow: hidden; }
.progress-fill { height: 100%; border-radius: 3px; background: var(--fill-accent); transition: width 0.3s; }

.chapter-btn {
  width: 100%; padding: 0.875rem 1rem; border-radius: 10px; margin-bottom: 8px;
  background: var(--surface-1); border: 0.5px solid var(--border);
  color: var(--text-primary); font-size: 14px; font-family: var(--font-sans);
  cursor: pointer; display: flex; align-items: center; justify-content: space-between;
  min-height: 52px;
}
.chapter-btn.selected { border-color: var(--border-accent); background: var(--bg-accent); color: var(--text-accent); }
.chapter-btn:active { transform: scale(0.98); }

.rate-grid {
  display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 8px; margin-top: 0.75rem;
}
.rate-btn {
  border-radius: 10px; padding: 0.875rem 0.5rem; font-size: 13px; font-weight: 500;
  cursor: pointer; border: 0.5px solid; font-family: var(--font-sans);
  min-height: 72px; display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 4px; line-height: 1.3;
}
.rate-btn i { font-size: 20px; }
.rate-sub { font-size: 11px; font-weight: 400; }
.rate-btn:active { transform: scale(0.97); }

select {
  width: 100%; border: 0.5px solid var(--border-strong); border-radius: var(--radius);
  padding: 0.6rem 0.75rem; background: var(--surface-2); color: var(--text-primary);
  font-size: 14px; font-family: var(--font-sans); min-height: 44px;
  margin-bottom: 0.75rem;
}
</style>

<h2 class="sr-only">中学1年 理科 スペースドリピティション暗記カード</h2>

<div id="scr-home" class="screen">
  <div class="top-bar">
    <h2>理科 暗記カード</h2>
    <button class="btn btn-icon" onclick="goStats()" aria-label="成績を見る">
      <i class="ti ti-chart-bar" style="font-size:20px" aria-hidden="true"></i>
    </button>
  </div>

  <div id="stats-mini" class="stat-grid" style="margin-bottom:1rem;"></div>

  <div class="card" style="margin-bottom:0.75rem;">
    <div style="font-size:12px;color:var(--text-muted);margin-bottom:0.5rem;">単元</div>
    <select id="ch-sel" onchange="refreshHome()">
      <option value="all">すべての単元</option>
      <option value="生命">生命（植物・動物）</option>
      <option value="地球">地球（大地・地震・火山）</option>
      <option value="物質">物質（物質・気体・水溶液）</option>
      <option value="エネルギー">エネルギー（光・音・力）</option>
    </select>
    <button class="btn-full accent" onclick="go('due')" id="btn-due" style="margin-bottom:8px;">
      <i class="ti ti-calendar" aria-hidden="true"></i>
      今日の復習 <span id="due-label"></span>
    </button>
    <button class="btn-full" onclick="go('all')">
      <i class="ti ti-cards" aria-hidden="true"></i> 全問題
    </button>
  </div>
</div>

<div id="scr-study" class="screen">
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:0.75rem;">
    <button class="btn btn-icon" onclick="goHome()" aria-label="ホームへ">
      <i class="ti ti-arrow-left" style="font-size:20px" aria-hidden="true"></i>
    </button>
    <div class="progress-bar" style="flex:1;"><div class="progress-fill" id="prog-fill"></div></div>
    <span style="font-size:13px;color:var(--text-muted);min-width:40px;text-align:right;" id="prog-txt"></span>
  </div>

  <div class="card" style="margin-bottom:0.75rem;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem;">
      <span id="ch-tag" class="tag"></span>
      <span style="font-size:11px;color:var(--text-muted);" id="rep-info"></span>
    </div>
    <div style="font-size:15px;line-height:1.8;color:var(--text-primary);" id="q-text"></div>
  </div>

  <div id="reveal-area">
    <button class="btn-full" onclick="reveal()" style="margin-bottom:0.5rem;">
      <i class="ti ti-eye" aria-hidden="true"></i> 答えを確認する
    </button>
    <p style="font-size:12px;color:var(--text-muted);text-align:center;margin:0;">紙に書いてから確認しよう</p>
  </div>

  <div id="answer-area" style="display:none;">
    <div class="card" style="border-color:var(--border-accent);margin-bottom:0.75rem;">
      <div style="font-size:11px;color:var(--text-muted);margin-bottom:4px;">正解</div>
      <div style="font-size:16px;font-weight:500;color:var(--text-accent);line-height:1.8;" id="a-text"></div>
    </div>
    <div style="font-size:12px;color:var(--text-secondary);text-align:center;margin-bottom:8px;">自分の答えと比べて？</div>
    <div class="rate-grid">
      <button class="rate-btn" onclick="rate(0)"
        style="background:var(--bg-danger);color:var(--text-danger);border-color:var(--border-danger);">
        <i class="ti ti-x" aria-hidden="true"></i>
        わからない<span class="rate-sub">もう一度</span>
      </button>
      <button class="rate-btn" onclick="rate(3)"
        style="background:var(--bg-warning);color:var(--text-warning);border-color:var(--border-warning);">
        <i class="ti ti-minus" aria-hidden="true"></i>
        もう少し<span class="rate-sub">明日</span>
      </button>
      <button class="rate-btn" onclick="rate(5)"
        style="background:var(--bg-success);color:var(--text-success);border-color:var(--border-success);">
        <i class="ti ti-check" aria-hidden="true"></i>
        覚えた<span class="rate-sub">数日後</span>
      </button>
    </div>
  </div>
</div>

<div id="scr-stats" class="screen">
  <div class="top-bar">
    <button class="btn btn-icon" onclick="goHome()" aria-label="ホームへ">
      <i class="ti ti-arrow-left" style="font-size:20px" aria-hidden="true"></i>
    </button>
    <span style="font-size:16px;font-weight:500;">成績</span>
    <div style="width:44px;"></div>
  </div>
  <div id="stats-detail"></div>
  <button class="btn-full" onclick="resetAll()"
    style="margin-top:0.5rem;color:var(--text-danger);border-color:var(--border-danger);">
    <i class="ti ti-trash" aria-hidden="true"></i> データをリセット
  </button>
</div>

<div id="scr-done" class="screen">
  <div style="text-align:center;padding:2.5rem 1rem;">
    <i class="ti ti-trophy" style="font-size:52px;color:var(--text-warning);" aria-hidden="true"></i>
    <div style="font-size:20px;font-weight:500;margin:1rem 0 0.5rem;">お疲れさまでした！</div>
    <div style="color:var(--text-muted);font-size:14px;margin-bottom:2rem;" id="done-msg"></div>
    <button class="btn-full" onclick="goHome()" style="margin-bottom:8px;">ホームへ戻る</button>
    <button class="btn-full accent" onclick="restart()">もう一度</button>
  </div>
</div>

const CH_STYLE={
  生命:'color:var(--text-success);background:var(--bg-success);border-color:var(--border-success)',
  地球:'color:var(--text-accent);background:var(--bg-accent);border-color:var(--border-accent)',
  物質:'color:var(--text-warning);background:var(--bg-warning);border-color:var(--border-warning)',
  エネルギー:'color:var(--text-danger);background:var(--bg-danger);border-color:var(--border-danger)'
};

let srs={}, queue=[], cur=0, lastMode='all', lastCh='all';

function load(){
  try{ const s=localStorage.getItem('srs3'); if(s) srs=JSON.parse(s); }catch(e){}
  CARDS.forEach(c=>{ if(!srs[c.id]) srs[c.id]={rep:0,iv:1,ease:2.5,due:0}; });
}
function save(){ try{ localStorage.setItem('srs3',JSON.stringify(srs)); }catch(e){} }

function sm2(id,q){
  const d=srs[id];
  if(q<3){ d.rep=0; d.iv=1; }
  else{
    if(d.rep===0) d.iv=1;
    else if(d.rep===1) d.iv=3;
    else d.iv=Math.round(d.iv*d.ease);
    d.rep++;
    d.ease=Math.max(1.3, d.ease+0.1-(5-q)*(0.08+(5-q)*0.02));
  }
  d.due=Date.now()+d.iv*86400000;
  save();
}

function getCards(m,ch){
  const now=Date.now();
  return CARDS.filter(c=>{
    if(ch!=='all'&&c.ch!==ch) return false;
    if(m==='due') return srs[c.id].due<=now;
    return true;
  });
}

function show(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }

function goHome(){ show('scr-home'); refreshHome(); }

function refreshHome(){
  const ch=document.getElementById('ch-sel').value;
  const due=getCards('due',ch);
  const all=getCards('all',ch);
  const learned=all.filter(c=>srs[c.id].rep>0).length;
  const mastered=all.filter(c=>srs[c.id].rep>=3).length;

  document.getElementById('due-label').textContent=due.length>0?`(${due.length}問)`:'(なし)';

  document.getElementById('stats-mini').innerHTML=`
    <div class="stat-card"><div class="stat-num">${all.length}</div><div class="stat-label">全問題</div></div>
    <div class="stat-card"><div class="stat-num">${due.length}</div><div class="stat-label">今日の復習</div></div>
    <div class="stat-card"><div class="stat-num">${learned}</div><div class="stat-label">学習済み</div></div>
    <div class="stat-card"><div class="stat-num">${mastered}</div><div class="stat-label">マスター</div></div>`;
}

function go(m){
  const ch=document.getElementById('ch-sel').value;
  lastMode=m; lastCh=ch;
  queue=getCards(m,ch).sort(()=>Math.random()-0.5);
  if(!queue.length){ alert('問題がありません'); return; }
  cur=0; show('scr-study'); showCard();
}

function showCard(){
  if(cur>=queue.length){ show('scr-done'); document.getElementById('done-msg').textContent=queue.length+'問完了'; return; }
  const c=queue[cur], d=srs[c.id];
  const pct=Math.round(cur/queue.length*100);
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-txt').textContent=(cur+1)+'/'+queue.length;
  const tag=document.getElementById('ch-tag');
  tag.textContent=c.ch; tag.style.cssText=CH_STYLE[c.ch]||'';
  document.getElementById('rep-info').textContent=d.rep>0?`${d.iv}日後 | ${d.rep}回目`:'初めて';
  document.getElementById('q-text').textContent=c.q;
  document.getElementById('a-text').textContent=c.a;
  document.getElementById('reveal-area').style.display='block';
  document.getElementById('answer-area').style.display='none';
}

function reveal(){
  document.getElementById('reveal-area').style.display='none';
  document.getElementById('answer-area').style.display='block';
}

function rate(q){ sm2(queue[cur].id,q); cur++; showCard(); }
function restart(){ go(lastMode); }

function goStats(){
  show('scr-stats');
  const chs=['生命','地球','物質','エネルギー'];
  let html='';
  chs.forEach(ch=>{
    const cards=CARDS.filter(c=>c.ch===ch);
    const learned=cards.filter(c=>srs[c.id].rep>0).length;
    const mastered=cards.filter(c=>srs[c.id].rep>=3).length;
    const pct=Math.round(learned/cards.length*100);
    html+=`<div class="card" style="margin-bottom:8px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <span class="tag" style="${CH_STYLE[ch]}">${ch}</span>
        <span style="font-size:12px;color:var(--text-muted);">マスター ${mastered}/${cards.length}</span>
      </div>
      <div class="progress-bar" style="margin-bottom:4px;"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div style="font-size:11px;color:var(--text-muted);">学習済み ${learned}/${cards.length}（${pct}%）</div>
    </div>`;
  });
  document.getElementById('stats-detail').innerHTML=html;
}

function resetAll(){
  if(confirm('全データをリセットしますか？')){ localStorage.removeItem('srs3'); srs={}; load(); goHome(); }
}

load(); goHome();
</script>
