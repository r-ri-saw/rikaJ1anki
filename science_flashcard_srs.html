
<style>
  .card { background: var(--surface-2); border: 0.5px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
  .btn { cursor: pointer; border: 0.5px solid var(--border-strong); border-radius: var(--radius); padding: 0.5rem 1rem; background: transparent; color: var(--text-primary); font-size: 14px; font-family: var(--font-sans); }

  .btn-lg { padding: 0.75rem 1.25rem; font-size: 15px; border-radius: 8px; }

  .progress-fill { height: 100%; border-radius: 2px; background: var(--fill-accent); transition: width 0.3s; }
  #home, #study, #stats { display: none; }
  select { border: 0.5px solid var(--border-strong); border-radius: var(--radius); padding: 0.4rem 0.6rem; background: var(--surface-2); color: var(--text-primary); font-size: 13px; font-family: var(--font-sans); }
</style>

<h2 class="sr-only">中学1年 理科 スペースドリピティション暗記カード</h2>

<div id="home">
  <div style="margin-bottom:1rem; display:flex; align-items:center; justify-content:space-between;">
    <h2 style="margin:0; font-size:18px; font-weight:500;">理科 暗記カード</h2>
    <button class="btn" onclick="showStats()"><i class="ti ti-chart-bar" aria-hidden="true"></i> 成績</button>
  </div>

  <div class="card" style="margin-bottom:0.75rem;">
    <div style="font-size:13px; color:var(--text-secondary); margin-bottom:0.75rem;">単元を選ぶ</div>
    <select id="chapter-select" style="width:100%; margin-bottom:1rem;">
      <option value="all">すべての単元</option>
      <option value="生命">生命（植物・動物）</option>
      <option value="地球">地球（大地・地震・火山）</option>
      <option value="物質">物質（物質・気体・水溶液）</option>
      <option value="エネルギー">エネルギー（光・音・力）</option>
    </select>
    <div style="display:flex; gap:0.5rem; flex-wrap:wrap;">
      <button class="btn btn-lg" onclick="startStudy('due')" style="flex:1; border-color:var(--border-accent); color:var(--text-accent);">
        <i class="ti ti-calendar" aria-hidden="true"></i> 今日の復習 <span id="due-count" style="font-weight:500;"></span>
      </button>
      <button class="btn btn-lg" onclick="startStudy('all')" style="flex:1;">
        <i class="ti ti-cards" aria-hidden="true"></i> 全問題
      </button>
    </div>
  </div>

  <div id="stats-mini" style="display:grid; grid-template-columns:repeat(3,1fr); gap:8px;"></div>
</div>

<div id="study">
  <div style="display:flex; align-items:center; gap:0.75rem; margin-bottom:1rem;">
    <button class="btn" onclick="showHome()" aria-label="ホームへ戻る"><i class="ti ti-arrow-left" aria-hidden="true"></i></button>
    <div class="progress-bar" style="flex:1;"><div class="progress-fill" id="progress-fill"></div></div>
    <span style="font-size:13px; color:var(--text-secondary);" id="progress-text"></span>
  </div>

  <div class="card" id="question-card">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
      <span id="chapter-tag" class="tag"></span>
      <span style="font-size:12px; color:var(--text-muted);" id="interval-info"></span>
    </div>
    <div style="font-size:15px; line-height:1.8; color:var(--text-primary);" id="question-text"></div>
  </div>

  <div id="show-answer-area" style="text-align:center; padding:1rem 0;">
    <button class="btn btn-lg" onclick="revealAnswer()" style="min-width:200px;">
      答えを確認する <i class="ti ti-eye" aria-hidden="true"></i>
    </button>
    <p style="font-size:13px; color:var(--text-muted); margin-top:0.75rem;">紙に書いてから確認しよう</p>
  </div>

  <div id="answer-area" style="display:none;">
    <div class="card" style="border-color:var(--border-accent);">
      <div style="font-size:12px; color:var(--text-muted); margin-bottom:0.5rem;">正解</div>
      <div style="font-size:16px; font-weight:500; color:var(--text-accent); line-height:1.8;" id="answer-text"></div>
    </div>
    <div style="font-size:13px; color:var(--text-secondary); text-align:center; margin-bottom:0.75rem;">自分の答えと比べてどうでしたか？</div>
    <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px;">
      <button class="answer-btn" onclick="rate(0)" style="background:var(--bg-danger); color:var(--text-danger); border-color:var(--border-danger);">
        <i class="ti ti-x" aria-hidden="true"></i><br>わからない<br><span style="font-size:11px; font-weight:400;">もう一度</span>
      </button>
      <button class="answer-btn" onclick="rate(3)" style="background:var(--bg-warning); color:var(--text-warning); border-color:var(--border-warning);">
        <i class="ti ti-minus" aria-hidden="true"></i><br>もう少し<br><span style="font-size:11px; font-weight:400;">明日</span>
      </button>
      <button class="answer-btn" onclick="rate(5)" style="background:var(--bg-success); color:var(--text-success); border-color:var(--border-success);">
        <i class="ti ti-check" aria-hidden="true"></i><br>覚えた<br><span style="font-size:11px; font-weight:400;">数日後</span>
      </button>
    </div>
  </div>
</div>

<div id="stats">
  <div style="display:flex; align-items:center; gap:0.75rem; margin-bottom:1rem;">
    <button class="btn" onclick="showHome()" aria-label="ホームへ戻る"><i class="ti ti-arrow-left" aria-hidden="true"></i></button>
    <span style="font-size:16px; font-weight:500;">成績</span>
  </div>
  <div id="stats-detail"></div>
</div>

const SM2_EASE_DEFAULT = 2.5;
let data = {};
let queue = [];
let current = 0;
let mode = 'all';
let filterCh = 'all';

function loadData() {
  try {
    const saved = localStorage.getItem('srs_v2');
    if (saved) data = JSON.parse(saved);
  } catch(e) {}
  CARDS.forEach(c => {
    if (!data[c.id]) data[c.id] = {rep:0, interval:0, ease:SM2_EASE_DEFAULT, due:0, correct:0, wrong:0};
  });
}

function saveData() {
  try { localStorage.setItem('srs_v2', JSON.stringify(data)); } catch(e) {}
}

function sm2(card, q) {
  const d = data[card.id];
  if (q < 3) {
    d.rep = 0; d.interval = 1;
  } else {
    if (d.rep === 0) d.interval = 1;
    else if (d.rep === 1) d.interval = 3;
    else d.interval = Math.round(d.interval * d.ease);
    d.rep += 1;
    d.ease = Math.max(1.3, d.ease + 0.1 - (5-q)*(0.08+(5-q)*0.02));
  }
  d.due = Date.now() + d.interval * 86400000;
  if (q >= 4) d.correct += 1; else d.wrong += 1;
  saveData();
}

function getDueCards(ch) {
  const now = Date.now();
  return CARDS.filter(c => {
    if (ch !== 'all' && c.ch !== ch) return false;
    return data[c.id].due <= now;
  });
}

function getAllCards(ch) {
  return CARDS.filter(c => ch === 'all' || c.ch === ch);
}

function showHome() {
  document.getElementById('home').style.display = 'block';
  document.getElementById('study').style.display = 'none';
  document.getElementById('stats').style.display = 'none';
  updateHome();
}

function updateHome() {
  filterCh = document.getElementById('chapter-select').value;
  const due = getDueCards(filterCh);
  const dueEl = document.getElementById('due-count');
  dueEl.textContent = due.length > 0 ? `(${due.length}問)` : '(なし)';

  const mini = document.getElementById('stats-mini');
  const total = getAllCards(filterCh).length;
  const learned = getAllCards(filterCh).filter(c => data[c.id].rep > 0).length;
  const mastered = getAllCards(filterCh).filter(c => data[c.id].rep >= 3).length;
  mini.innerHTML = `
    <div style="background:var(--surface-1);border-radius:var(--radius);padding:0.75rem;text-align:center;">
      <div style="font-size:11px;color:var(--text-muted);margin-bottom:4px;">全問題</div>
      <div style="font-size:22px;font-weight:500;">${total}</div>
    </div>
    <div style="background:var(--surface-1);border-radius:var(--radius);padding:0.75rem;text-align:center;">
      <div style="font-size:11px;color:var(--text-muted);margin-bottom:4px;">学習済み</div>
      <div style="font-size:22px;font-weight:500;">${learned}</div>
    </div>
    <div style="background:var(--surface-1);border-radius:var(--radius);padding:0.75rem;text-align:center;">
      <div style="font-size:11px;color:var(--text-muted);margin-bottom:4px;">マスター</div>
      <div style="font-size:22px;font-weight:500;">${mastered}</div>
    </div>`;
}

function startStudy(m) {
  filterCh = document.getElementById('chapter-select').value;
  mode = m;
  queue = m === 'due' ? getDueCards(filterCh) : getAllCards(filterCh);
  queue = queue.sort(() => Math.random() - 0.5);
  if (queue.length === 0) { alert('問題がありません'); return; }
  current = 0;
  document.getElementById('home').style.display = 'none';
  document.getElementById('study').style.display = 'block';
  document.getElementById('stats').style.display = 'none';
  showCard();
}

function showCard() {
  if (current >= queue.length) { showFinish(); return; }
  const card = queue[current];
  const d = data[card.id];
  const pct = Math.round(current / queue.length * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${current+1}/${queue.length}`;

  const chColors = {生命:'color:var(--text-success);background:var(--bg-success);border-color:var(--border-success)',地球:'color:var(--text-accent);background:var(--bg-accent);border-color:var(--border-accent)',物質:'color:var(--text-warning);background:var(--bg-warning);border-color:var(--border-warning)',エネルギー:'color:var(--text-danger);background:var(--bg-danger);border-color:var(--border-danger)'};
  const tagEl = document.getElementById('chapter-tag');
  tagEl.textContent = card.ch;
  tagEl.style.cssText = chColors[card.ch] || '';

  const iEl = document.getElementById('interval-info');
  iEl.textContent = d.rep > 0 ? `間隔 ${d.interval}日 | ${d.rep}回目` : '初めて';

  document.getElementById('question-text').textContent = card.q;
  document.getElementById('answer-text').textContent = card.a;
  document.getElementById('show-answer-area').style.display = 'block';
  document.getElementById('answer-area').style.display = 'none';
}

function revealAnswer() {
  document.getElementById('show-answer-area').style.display = 'none';
  document.getElementById('answer-area').style.display = 'block';
}

function rate(q) {
  sm2(queue[current], q);
  current++;
  showCard();
}

function showFinish() {
  document.getElementById('study').innerHTML = `
    <div style="text-align:center;padding:2rem 1rem;">
      <div style="font-size:32px;margin-bottom:1rem;"><i class="ti ti-trophy" style="font-size:48px;color:var(--text-warning);" aria-hidden="true"></i></div>
      <div style="font-size:20px;font-weight:500;margin-bottom:0.5rem;">お疲れさまでした！</div>
      <div style="color:var(--text-secondary);font-size:14px;margin-bottom:2rem;">${queue.length}問完了</div>
      <div style="display:flex;gap:0.5rem;justify-content:center;flex-wrap:wrap;">
        <button class="btn btn-lg" onclick="showHome()">ホームへ</button>
        <button class="btn btn-lg" onclick="startStudy(mode)">もう一度</button>
      </div>
    </div>`;
}

function showStats() {
  document.getElementById('home').style.display = 'none';
  document.getElementById('study').style.display = 'none';
  document.getElementById('stats').style.display = 'block';

  const chapters = ['生命','地球','物質','エネルギー'];
  let html = '';
  chapters.forEach(ch => {
    const cards = CARDS.filter(c => c.ch === ch);
    const learned = cards.filter(c => data[c.id].rep > 0).length;
    const mastered = cards.filter(c => data[c.id].rep >= 3).length;
    const pct = Math.round(learned / cards.length * 100);
    html += `
      <div class="card" style="margin-bottom:0.75rem;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem;">
          <span style="font-size:14px;font-weight:500;">${ch}</span>
          <span style="font-size:12px;color:var(--text-muted);">${mastered}/${cards.length} マスター</span>
        </div>
        <div class="progress-bar" style="margin-bottom:4px;"><div class="progress-fill" style="width:${pct}%"></div></div>
        <div style="font-size:11px;color:var(--text-muted);">学習済み ${learned}/${cards.length} (${pct}%)</div>
      </div>`;
  });
  html += `<button class="btn" onclick="if(confirm('全データをリセットしますか？')){localStorage.removeItem('srs_v2');loadData();showHome();}" style="width:100%;margin-top:0.5rem;color:var(--text-danger);border-color:var(--border-danger);">データをリセット</button>`;
  document.getElementById('stats-detail').innerHTML = html;
}

document.getElementById('chapter-select').addEventListener('change', updateHome);
loadData();
showHome();
</script>
